name: Update List
on:
  push:
    branches: [ main ]
  schedule: 
    - cron: "0 */6 * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Cache data files
      uses: actions/cache@v4
      with:
        path: |
          epss_scores-current.csv
          metasploit.txt
          nuclei.txt
          known_exploited_vulnerabilities.csv
          nvd.jsonl
        key: data-${{ hashFiles('**/cache-key') }}
        restore-keys: |
          data-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert
        pip install -r requirements.txt

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl wget gzip

    - name: Grab Needed Data
      run: |
        set -e
        
        # Download EPSS data with retry
        for i in {1..3}; do
          wget --retry-connrefused --waitretry=5 --timeout=30 \
            https://epss.cyentia.com/epss_scores-current.csv.gz \
            -O epss_scores-current.csv.gz && break || sleep 10
        done
        gzip -f -d epss_scores-current.csv.gz
        
        # Download Metasploit data
        for i in {1..3}; do
          curl --retry 3 --retry-delay 5 --max-time 30 \
            https://raw.githubusercontent.com/rapid7/metasploit-framework/master/db/modules_metadata_base.json \
            -o metasploit_temp.json && break || sleep 10
        done
        jq '.[]|{cve:.references[]|select(startswith("CVE-"))}| join(",")' metasploit_temp.json > metasploit.txt
        rm metasploit_temp.json
        
        # Download Nuclei templates
        for i in {1..3}; do
          curl --retry 3 --retry-delay 5 --max-time 30 \
            https://raw.githubusercontent.com/projectdiscovery/nuclei-templates/main/cves.json \
            -o nuclei_temp.json && break || sleep 10
        done
        jq -r .ID nuclei_temp.json > nuclei.txt
        rm nuclei_temp.json
        
        # Download CISA data
        for i in {1..3}; do
          wget --retry-connrefused --waitretry=5 --timeout=30 \
            https://www.cisa.gov/sites/default/files/csv/known_exploited_vulnerabilities.csv \
            -O known_exploited_vulnerabilities.csv && break || sleep 10
        done
        
        # Download NVD data
        for i in {1..3}; do
          wget --retry-connrefused --waitretry=5 --timeout=30 \
            https://nvd.handsonhacking.org/nvd.jsonl \
            -O nvd.jsonl && break || sleep 10
        done
        
        # Validate files exist
        for file in epss_scores-current.csv metasploit.txt nuclei.txt known_exploited_vulnerabilities.csv nvd.jsonl; do
          if [ ! -s "$file" ]; then
            echo "Error: $file is empty or does not exist"
            exit 1
          fi
        done

    - name: Run Notebooks
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        jupyter nbconvert --to notebook --inplace --execute secpatch.ipynb
    
    - name: Commit changes
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: EndBug/add-and-commit@v9
      with:
        default_author: github_actions
        message: 'Update CVE data [skip ci]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
